<!--
    navbar.html — Standalone Navbar Partial (Dark Theme Variant)

    This is an alternative navbar template with a dark glassmorphism style.
    It can be included in templates using {% include "core/navbar.html" %}.

    Note: base.html has its OWN navbar built-in (light theme).
    This file is kept as a standalone partial for pages that don't extend base.html.

    Auth-aware: Shows different links depending on login state.
-->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top"
    style="background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1);">
    <div class="container">
        <a class="navbar-brand" href="{% url 'index' %}" style="font-weight: 800; letter-spacing: -0.5px;">
            <i class="fas fa-graduation-cap me-2 text-primary"></i>Skill Exchange
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'browse' %}">Browse Skills</a>
                </li>
                <!-- Authenticated users see: Browse, Sessions, Profile dropdown with logout -->
                {% if user.is_authenticated %}
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'sessions' %}">My Sessions</a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                        <i class="fas fa-user-circle me-1"></i>{{ user.first_name|default:user.username }}
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark" style="background: #2d3748;">
                        <li><a class="dropdown-item" href="{% url 'profile' %}"><i
                                    class="fas fa-user me-2"></i>Profile</a></li>
                        <li>
                            <hr class="dropdown-divider" style="border-color: rgba(255,255,255,0.1);">
                        </li>
                        <li>
                            <form method="post" action="{% url 'logout' %}">
                                {% csrf_token %}
                                <button type="submit" class="dropdown-item text-danger"><i
                                        class="fas fa-sign-out-alt me-2"></i>Logout</button>
                            </form>
                        </li>
                    </ul>
                </li>
                <!-- Non-authenticated users see: Login link + Get Started button -->
                {% else %}
                <li class="nav-item ms-2">
                    <a class="nav-link" href="{% url 'login' %}">Login</a>
                </li>
                <li class="nav-item ms-2">
                    <a class="btn btn-primary btn-sm rounded-pill px-4" href="{% url 'register' %}">Get Started</a>
                </li>
                {% endif %}
            </ul>
        </div>
    </div>
</nav>
